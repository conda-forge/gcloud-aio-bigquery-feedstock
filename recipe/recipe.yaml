schema_version: 1

context:
  name: gcloud-aio-bigquery
  version: 7.1.0

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/gcloud_aio_bigquery-${{ version }}.tar.gz
  sha256: 4a3c775c2677c0588e9caeb2df40d81a54b31c174e562a527cb08e023c4408a3

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - gcloud-aio-auth >=3.1.0,<6.0.0

tests:
  - python:
      imports:
        - gcloud.aio.bigquery
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Python Client for Google Cloud BigQuery
  license: MIT
  license_file: LICENSE.txt
  homepage: https://github.com/talkiq/gcloud-aio

extra:
  recipe-maintainers:
    - xylar
